<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monopoly Plus</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- SETUP SCREEN -->
    <div id="setup-screen" class="screen active">
        <div class="setup-container">
            <h1>Monopoly <span class="plus">Plus</span></h1>
            <p class="subtitle">Stockholmsupplagan</p>

            <div id="setup-new" class="setup-panel">
                <button id="btn-new-game" class="btn btn-primary btn-large">Nytt Spel</button>
            </div>

            <div id="setup-players" class="setup-panel hidden">
                <h2>Lägg till spelare</h2>
                <div id="player-list-setup"></div>
                <div class="input-row">
                    <input type="text" id="player-name-input" placeholder="Spelarnamn..." maxlength="15">
                    <button id="btn-add-player" class="btn btn-secondary">Lägg till</button>
                </div>
                <p class="hint">Minst 2 spelare, max 6</p>
                <button id="btn-start-game" class="btn btn-primary btn-large hidden">Starta Spelet</button>
            </div>
        </div>
    </div>

    <!-- GAME SCREEN -->
    <div id="game-screen" class="screen">
        <div class="game-layout">
            <!-- Board -->
            <div class="board-wrapper">
                <div class="board" id="board">
                    <!-- Board squares generated by JS -->
                </div>
            </div>

            <!-- Side Panel -->
            <div class="side-panel">
                <h2>Monopoly <span class="plus">Plus</span></h2>

                <!-- Current Turn -->
                <div class="turn-info" id="turn-info">
                    <div class="current-player-name" id="current-player-name">-</div>
                    <div class="current-player-balance" id="current-player-balance">-</div>
                </div>

                <!-- Dice -->
                <div class="dice-area">
                    <div class="dice-display">
                        <div class="die" id="die1">?</div>
                        <div class="die" id="die2">?</div>
                    </div>
                    <button id="btn-roll" class="btn btn-primary">Slå tärning</button>
                    <button id="btn-buy" class="btn btn-secondary hidden">Köp fastighet</button>
                </div>

                <!-- Players -->
                <div class="players-panel">
                    <h3>Spelare</h3>
                    <div id="players-list"></div>
                </div>

                <!-- Game Log -->
                <div class="log-panel">
                    <h3>Händelser</h3>
                    <div id="game-log"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/game.js"></script>
</body>
</html>
